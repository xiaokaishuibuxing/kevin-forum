  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"c541ce40-e222-4131-b8ba-8e321fd9dfe9\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<script src=\"db2baded-c5a9-4df7-b33c-6b2b650727ef\"><\u002Fscript>\n<style>\n  html, body { margin: 0; padding: 0; background: #F0EBDF; }\n  body { font-family: 'Noto Sans SC', sans-serif; color: #1B1A17; -webkit-font-smoothing: antialiased; }\n  a { color: #2547D0; text-decoration: none; }\n  a:hover { color: #16309B; }\n  @keyframes riseIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-width: 1200px; background: #F0EBDF;\">\n\n  <!-- ══════════ NAV ══════════ -->\n  <nav style=\"display: flex; align-items: center; justify-content: space-between; padding: 0 64px; height: 76px; border-bottom: 1px solid #E3DFD6; position: sticky; top: 0; background: rgba(240,235,223,0.92); backdrop-filter: blur(12px); z-index: 50;\">\n    <div style=\"display: flex; align-items: center; gap: 12px;\">\n      <div style=\"width: 34px; height: 34px; background: #2547D0; color: #F0EBDF; display: grid; place-items: center; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px;\">K<\u002Fdiv>\n      <span style=\"font-family: 'Noto Serif SC', serif; font-weight: 700; font-size: 20px; letter-spacing: 0.04em;\">Kevin论坛<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display: flex; align-items: center; gap: 36px; font-size: 15px; color: #4A4740;\">\n      <a href=\"#services\" style=\"color: #4A4740;\">论坛板块<\u002Fa>\n      <a href=\"#about\" style=\"color: #4A4740;\">关于我们<\u002Fa>\n      <a href=\"#cases\" style=\"color: #4A4740;\">合作伙伴<\u002Fa>\n      <a href=\"#ai\" style=\"color: #4A4740;\">AI 分析<\u002Fa>\n      <a href=\"#learn\" style=\"color: #4A4740;\">学习路径<\u002Fa>\n      <a href=\"#compare\" style=\"color: #4A4740;\">PM 对比<\u002Fa>\n      <a href=\"#contact\" style=\"display: inline-flex; align-items: center; height: 42px; padding: 0 24px; background: #1B1A17; color: #F0EBDF; font-weight: 500;\" style-hover=\"background: #2547D0; color: #F0EBDF;\">联系我们<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- ══════════ HERO ══════════ -->\n  <header data-screen-label=\"首屏\" style=\"position: relative; padding: 110px 64px 96px; border-bottom: 1px solid #E3DFD6; overflow: hidden;\">\n    <div style=\"position: absolute; inset: 0; background-image: linear-gradient(#E3DFD6 1px, transparent 1px), linear-gradient(90deg, #E3DFD6 1px, transparent 1px); background-size: 72px 72px; opacity: 0.5;\"><\u002Fdiv>\n    <div style=\"position: relative; max-width: 1240px; margin: 0 auto; display: grid; grid-template-columns: 1.4fr 1fr; gap: 64px; align-items: end;\">\n      <div style=\"animation: riseIn 0.8s ease both;\">\n        <div style=\"display: inline-flex; align-items: center; gap: 10px; font-family: 'Space Grotesk', sans-serif; font-size: 13px; letter-spacing: 0.18em; color: #2547D0; border: 1px solid #2547D0; padding: 8px 16px; margin-bottom: 36px;\">\n          <span style=\"width: 8px; height: 8px; background: #2547D0; border-radius: 50%;\"><\u002Fspan>\n          AI PRODUCT MANAGER COMMUNITY\n        <\u002Fdiv>\n        <h1 style=\"font-family: 'Noto Serif SC', serif; font-weight: 900; font-size: 76px; line-height: 1.14; margin: 0 0 28px; letter-spacing: 0.01em;\">AI 产品经理的<br>发展与未来，<br>从这里<span style=\"color: #2547D0;\">规划<\u002Fspan>。<\u002Fh1>\n        <p style=\"font-size: 19px; line-height: 1.8; color: #4A4740; max-width: 520px; margin: 0 0 44px; text-wrap: pretty;\">Kevin论坛汇聚最新行业规范与前沿技术，连接正在招聘 AI 产品经理的企业与求职中的从业者，帮助每一位 AI PM 看清方向、走得更远。<\u002Fp>\n        <div style=\"display: flex; gap: 16px;\">\n          <a href=\"#services\" style=\"display: inline-flex; align-items: center; height: 56px; padding: 0 36px; background: #2547D0; color: #F0EBDF; font-size: 17px; font-weight: 500;\" style-hover=\"background: #16309B; color: #F0EBDF;\">进入论坛板块<\u002Fa>\n          <a href=\"#about\" style=\"display: inline-flex; align-items: center; height: 56px; padding: 0 36px; border: 1px solid #1B1A17; color: #1B1A17; font-size: 17px;\" style-hover=\"background: #1B1A17; color: #F0EBDF;\">了解我们<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"animation: riseIn 0.8s 0.15s ease both;\">\n        <div style=\"border: 1px solid #1B1A17; background: #FFFFFF;\">\n          <div style=\"padding: 14px 20px; border-bottom: 1px solid #1B1A17; font-family: 'Space Grotesk', sans-serif; font-size: 12px; letter-spacing: 0.16em; color: #4A4740; display: flex; justify-content: space-between;\">\n            <span>TODAY · 热议<\u002Fspan><span>2026.07<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding: 22px 20px; border-bottom: 1px solid #E3DFD6;\">\n            <div style=\"font-size: 13px; color: #2547D0; margin-bottom: 6px;\">行业规范<\u002Fdiv>\n            <div style=\"font-weight: 500; font-size: 16px; line-height: 1.5;\">AI 产品需求文档的新范式：从 PRD 到 Eval 驱动<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding: 22px 20px; border-bottom: 1px solid #E3DFD6;\">\n            <div style=\"font-size: 13px; color: #2547D0; margin-bottom: 6px;\">前沿技术<\u002Fdiv>\n            <div style=\"font-weight: 500; font-size: 16px; line-height: 1.5;\">Agent 产品的评估体系应该怎么搭？<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding: 22px 20px;\">\n            <div style=\"font-size: 13px; color: #2547D0; margin-bottom: 6px;\">招聘 · 求职<\u002Fdiv>\n            <div style=\"font-weight: 500; font-size: 16px; line-height: 1.5;\">本周 12 家企业发布 AI PM 岗位<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ══════════ 数据成果 ══════════ -->\n  <section data-screen-label=\"数据成果\" style=\"border-bottom: 1px solid #E3DFD6; background: #1B1A17; color: #F0EBDF;\">\n    <div style=\"max-width: 1240px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr);\">\n      <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"4\">\n        <div style=\"padding: 56px 40px; border-right: 1px solid #3A3831;\">\n          <div style=\"font-family: 'Space Grotesk', sans-serif; font-size: 52px; font-weight: 700; color: #F0EBDF;\">{{ s.value }}<span style=\"font-size: 24px; color: #7B8FE0;\">{{ s.unit }}<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size: 15px; color: #A8A49A; margin-top: 8px;\">{{ s.label }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════ 论坛板块 / 服务 ══════════ -->\n  <section id=\"services\" data-screen-label=\"论坛板块\" style=\"padding: 104px 64px; border-bottom: 1px solid #E3DFD6;\">\n    <div style=\"max-width: 1240px; margin: 0 auto;\">\n      <div style=\"display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 64px;\">\n        <h2 style=\"font-family: 'Noto Serif SC', serif; font-weight: 700; font-size: 44px; margin: 0;\">三大核心板块<\u002Fh2>\n        <span style=\"font-family: 'Space Grotesk', sans-serif; font-size: 13px; letter-spacing: 0.16em; color: #4A4740;\">01 — WHAT WE DO<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border: 1px solid #1B1A17;\">\n        <sc-for list=\"{{ services }}\" as=\"sv\" hint-placeholder-count=\"3\">\n          <div style=\"padding: 44px 36px 52px; border-right: 1px solid #1B1A17; background: #FFFFFF; transition: background 0.25s;\" style-hover=\"background: #EFF2FD;\">\n            <div style=\"font-family: 'Space Grotesk', sans-serif; font-size: 14px; color: #2547D0; margin-bottom: 28px;\">{{ sv.num }}<\u002Fdiv>\n            <h3 style=\"font-family: 'Noto Serif SC', serif; font-size: 26px; font-weight: 700; margin: 0 0 18px;\">{{ sv.title }}<\u002Fh3>\n            <p style=\"font-size: 15.5px; line-height: 1.8; color: #4A4740; margin: 0 0 28px; text-wrap: pretty;\">{{ sv.desc }}<\u002Fp>\n            <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n              <sc-for list=\"{{ sv.points }}\" as=\"p\" hint-placeholder-count=\"3\">\n                <div style=\"display: flex; align-items: center; gap: 10px; font-size: 14px; color: #1B1A17;\">\n                  <span style=\"width: 6px; height: 6px; background: #2547D0;\"><\u002Fspan>{{ p }}\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════ 关于我们 ══════════ -->\n  <section id=\"about\" data-screen-label=\"关于我们\" style=\"padding: 104px 64px; border-bottom: 1px solid #E3DFD6; background: #FFFFFF;\">\n    <div style=\"max-width: 1240px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 80px;\">\n      <div>\n        <span style=\"font-family: 'Space Grotesk', sans-serif; font-size: 13px; letter-spacing: 0.16em; color: #4A4740;\">02 — ABOUT<\u002Fspan>\n        <h2 style=\"font-family: 'Noto Serif SC', serif; font-weight: 700; font-size: 44px; margin: 20px 0 0; line-height: 1.3;\">让每一位 AI 产品经理<br>都有清晰的成长路径<\u002Fh2>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font-size: 18px; line-height: 2; color: #4A4740; margin: 0 0 24px; text-wrap: pretty;\">AI 产品经理是一个正在快速定义中的职业。规范在变、技术在变、企业的用人标准也在变。Kevin论坛持续整理最新的行业规范与技术动态，把分散的信息变成可执行的成长地图。<\u002Fp>\n        <p style=\"font-size: 18px; line-height: 2; color: #4A4740; margin: 0 0 40px; text-wrap: pretty;\">我们同时服务两端：帮助企业找到真正懂 AI 的产品人，也帮助求职者理解企业到底需要什么样的能力。<\u002Fp>\n        <div style=\"display: flex; gap: 48px; border-top: 1px solid #E3DFD6; padding-top: 32px;\">\n          <div>\n            <div style=\"font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700; margin-bottom: 6px;\">内容公开<\u002Fdiv>\n            <div style=\"font-size: 14.5px; color: #4A4740;\">行业规范与技术整理免费开放<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700; margin-bottom: 6px;\">双向连接<\u002Fdiv>\n            <div style=\"font-size: 14.5px; color: #4A4740;\">企业与求职者在同一个社区对话<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700; margin-bottom: 6px;\">持续更新<\u002Fdiv>\n            <div style=\"font-size: 14.5px; color: #4A4740;\">每周跟进最新技术与岗位动态<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════ 合作伙伴 / 客户案例 ══════════ -->\n  <section id=\"cases\" data-screen-label=\"合作伙伴\" style=\"padding: 104px 64px; border-bottom: 1px solid #E3DFD6;\">\n    <div style=\"max-width: 1240px; margin: 0 auto;\">\n      <div style=\"display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 56px;\">\n        <h2 style=\"font-family: 'Noto Serif SC', serif; font-weight: 700; font-size: 44px; margin: 0;\">合作伙伴与社区之声<\u002Fh2>\n        <span style=\"font-family: 'Space Grotesk', sans-serif; font-size: 13px; letter-spacing: 0.16em; color: #4A4740;\">03 — PARTNERS<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px; background: #E3DFD6; border: 1px solid #E3DFD6; margin-bottom: 64px;\">\n        <sc-for list=\"{{ partners }}\" as=\"pt\" hint-placeholder-count=\"6\">\n          <div style=\"background: #F0EBDF; height: 96px; display: grid; place-items: center; font-family: 'Space Grotesk', sans-serif; font-size: 13px; letter-spacing: 0.1em; color: #A8A49A;\">{{ pt }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px;\">\n        <sc-for list=\"{{ quotes }}\" as=\"q\" hint-placeholder-count=\"2\">\n          <figure style=\"margin: 0; border-left: 2px solid #2547D0; padding: 8px 0 8px 32px;\">\n            <blockquote style=\"margin: 0 0 20px; font-family: 'Noto Serif SC', serif; font-size: 21px; line-height: 1.7; font-weight: 500;\">{{ q.text }}<\u002Fblockquote>\n            <figcaption style=\"font-size: 14px; color: #4A4740;\">{{ q.who }}<\u002Ffigcaption>\n          <\u002Ffigure>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════ AI 企业分析 ══════════ -->\n  <section id=\"ai\" data-screen-label=\"AI 企业分析\" style=\"padding: 104px 64px; border-bottom: 1px solid #E3DFD6; background: #FFFFFF;\">\n    <div style=\"max-width: 1240px; margin: 0 auto;\">\n      <div style=\"display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px;\">\n        <h2 style=\"font-family: 'Noto Serif SC', serif; font-weight: 700; font-size: 44px; margin: 0;\">AI 企业分析<\u002Fh2>\n        <span style=\"font-family: 'Space Grotesk', sans-serif; font-size: 13px; letter-spacing: 0.16em; color: #4A4740;\">04 — AI ANALYSIS<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-size: 17px; line-height: 1.8; color: #4A4740; max-width: 640px; margin: 0 0 48px; text-wrap: pretty;\">输入一家企业的名称，AI 将按照专业模版，围绕它的产品与未来规划，生成深度需求分析、用户分析与完整 PRD——AI 产品经理的随手工具。<\u002Fp>\n\n      <div style=\"border: 1px solid #1B1A17;\">\n        <div style=\"display: flex; gap: 0; border-bottom: 1px solid #1B1A17;\">\n          <input value=\"{{ aiCompany }}\" onchange=\"{{ onAiCompany }}\" onkeydown=\"{{ onAiKeyDown }}\" placeholder=\"输入企业名称，如：某智能驾驶公司 / 某AI办公工具…\" style=\"flex: 1; height: 64px; border: none; padding: 0 24px; font-size: 17px; font-family: 'Noto Sans SC', sans-serif; outline: none; background: #FFFFFF; color: #1B1A17;\">\n          <button onclick=\"{{ runAnalysis }}\" disabled=\"{{ aiLoading }}\" style=\"width: 180px; height: 64px; border: none; border-left: 1px solid #1B1A17; background: #2547D0; color: #F0EBDF; font-size: 17px; font-weight: 500; font-family: 'Noto Sans SC', sans-serif; cursor: pointer;\" style-hover=\"background: #16309B;\">{{ analyzeLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ showKeyRow }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display: flex; align-items: center; gap: 16px; padding: 14px 24px; border-bottom: 1px solid #E3DFD6; background: #FFF9E8;\">\n            <span style=\"font-size: 13px; color: #4A4740; white-space: nowrap;\">外部访问模式 · 需要 Anthropic API Key<\u002Fspan>\n            <input type=\"password\" value=\"{{ apiKey }}\" onchange=\"{{ onApiKey }}\" placeholder=\"sk-ant-…（仅保存在你的浏览器本地）\" style=\"flex: 1; height: 40px; border: 1px solid #C9C4B8; background: #FFFFFF; padding: 0 12px; font-size: 13px; font-family: monospace; outline: none;\">\n            <a href=\"https://console.anthropic.com/settings/keys\" target=\"_blank\" style=\"font-size: 13px; white-space: nowrap;\">获取 Key →<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display: flex; border-bottom: 1px solid #E3DFD6;\">\n          <sc-for list=\"{{ aiTabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ t.pick }}\" style=\"flex: 1; height: 54px; border: none; border-right: 1px solid #E3DFD6; background: {{ t.bg }}; color: {{ t.color }}; font-size: 15px; font-weight: 500; font-family: 'Noto Sans SC', sans-serif; cursor: pointer;\">{{ t.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"min-height: 320px; padding: 36px 40px; background: #F0EBDF;\">\n          <sc-if value=\"{{ aiShowEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"font-family: monospace; font-size: 14px; color: #A8A49A; line-height: 2;\">// 分析结果将显示在这里<br>// 输入企业名称并点击「开始分析」<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ aiLoading }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display: flex; align-items: center; gap: 14px; color: #2547D0; font-size: 16px;\">\n              <span style=\"width: 10px; height: 10px; background: #2547D0; border-radius: 50%; animation: riseIn 0.9s ease infinite alternate;\"><\u002Fspan>{{ aiLoadingText }}\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ aiError }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"color: #B0361C; font-size: 15px;\">{{ aiError }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ aiResult }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"white-space: pre-wrap; font-size: 15.5px; line-height: 1.9; color: #1B1A17; max-width: 880px;\">{{ aiResult }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"display: flex; align-items: center; border-top: 1px solid #1B1A17; background: #FFFFFF;\">\n          <span style=\"flex: 1; padding: 0 24px; font-size: 14px; color: #4A4740;\">将当前分析结果导出为文档<\u002Fspan>\n          <button onclick=\"{{ exportPPT }}\" style=\"height: 56px; padding: 0 28px; border: none; border-left: 1px solid #E3DFD6; background: #FFFFFF; color: #1B1A17; font-size: 15px; font-weight: 500; font-family: 'Noto Sans SC', sans-serif; cursor: pointer;\" style-hover=\"background: #1B1A17; color: #F0EBDF;\">↓ 导出 PPT<\u002Fbutton>\n          <button onclick=\"{{ exportExcel }}\" style=\"height: 56px; padding: 0 28px; border: none; border-left: 1px solid #E3DFD6; background: #FFFFFF; color: #1B1A17; font-size: 15px; font-weight: 500; font-family: 'Noto Sans SC', sans-serif; cursor: pointer;\" style-hover=\"background: #1B1A17; color: #F0EBDF;\">↓ 导出 Excel<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size: 13px; color: #A8A49A; margin-top: 16px;\">分析基于 AI 对公开信息的理解生成，仅供参考与练习使用。<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════ 学习路径 ══════════ -->\n  <section id=\"learn\" data-screen-label=\"学习路径\" style=\"padding: 104px 64px; border-bottom: 1px solid #E3DFD6;\">\n    <div style=\"max-width: 1240px; margin: 0 auto;\">\n      <div style=\"display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px;\">\n        <h2 style=\"font-family: 'Noto Serif SC', serif; font-weight: 700; font-size: 44px; margin: 0;\">AI 产品经理学习路径<\u002Fh2>\n        <span style=\"font-family: 'Space Grotesk', sans-serif; font-size: 13px; letter-spacing: 0.16em; color: #4A4740;\">05 — LEARNING PATH<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-size: 17px; line-height: 1.8; color: #4A4740; max-width: 640px; margin: 0 0 48px; text-wrap: pretty;\">从零到一的系统学习地图。点击阶段，查看对应的视频课程与文档资料。<\u002Fp>\n      <div style=\"display: grid; grid-template-columns: 340px 1fr; border: 1px solid #1B1A17; background: #FFFFFF;\">\n        <div style=\"display: flex; flex-direction: column; border-right: 1px solid #1B1A17;\">\n          <sc-for list=\"{{ learnStages }}\" as=\"st\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ st.pick }}\" style=\"text-align: left; border: none; border-bottom: 1px solid #E3DFD6; padding: 28px 28px; background: {{ st.bg }}; color: {{ st.color }}; cursor: pointer; font-family: 'Noto Sans SC', sans-serif;\">\n              <div style=\"font-family: 'Space Grotesk', sans-serif; font-size: 13px; color: {{ st.numColor }}; margin-bottom: 8px;\">STAGE {{ st.stage }}<\u002Fdiv>\n              <div style=\"font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 700;\">{{ st.title }}<\u002Fdiv>\n              <div style=\"font-size: 13.5px; margin-top: 8px; line-height: 1.6; color: {{ st.goalColor }};\">{{ st.goal }}<\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"padding: 32px 36px; display: flex; flex-direction: column; gap: 14px;\">\n          <sc-for list=\"{{ learnResources }}\" as=\"r\" hint-placeholder-count=\"3\">\n            <a href=\"{{ r.url }}\" target=\"_blank\" style=\"display: grid; grid-template-columns: 64px 1fr auto; align-items: center; gap: 20px; padding: 18px 22px; border: 1px solid #E3DFD6; color: #1B1A17; transition: border-color 0.2s;\" style-hover=\"border-color: #2547D0; color: #1B1A17;\">\n              <span style=\"font-size: 12px; letter-spacing: 0.1em; text-align: center; padding: 5px 0; background: {{ r.tagBg }}; color: {{ r.tagColor }};\">{{ r.type }}<\u002Fspan>\n              <span>\n                <span style=\"display: block; font-weight: 700; font-size: 16px;\">{{ r.title }}<\u002Fspan>\n                <span style=\"display: block; font-size: 13.5px; color: #4A4740; margin-top: 4px;\">{{ r.desc }}<\u002Fspan>\n              <\u002Fspan>\n              <span style=\"font-family: 'Space Grotesk', sans-serif; color: #2547D0;\">→<\u002Fspan>\n            <\u002Fa>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════ 传统 PM vs AI PM ══════════ -->\n  <section id=\"compare\" data-screen-label=\"传统PM与AI PM对比\" style=\"padding: 104px 64px; border-bottom: 1px solid #E3DFD6; background: #FFFFFF;\">\n    <div style=\"max-width: 1240px; margin: 0 auto;\">\n      <div style=\"display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px;\">\n        <h2 style=\"font-family: 'Noto Serif SC', serif; font-weight: 700; font-size: 44px; margin: 0;\">传统产品经理 vs AI 产品经理<\u002Fh2>\n        <span style=\"font-family: 'Space Grotesk', sans-serif; font-size: 13px; letter-spacing: 0.16em; color: #4A4740;\">06 — TRANSITION<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-size: 17px; line-height: 1.8; color: #4A4740; max-width: 640px; margin: 0 0 48px; text-wrap: pretty;\">五个关键维度的差异与转型注意事项。点击维度展开查看。<\u002Fp>\n      <div style=\"border: 1px solid #1B1A17;\">\n        <sc-for list=\"{{ pmDims }}\" as=\"d\" hint-placeholder-count=\"5\">\n          <div style=\"border-bottom: 1px solid #E3DFD6; background: {{ d.bg }};\">\n            <button onclick=\"{{ d.toggle }}\" style=\"width: 100%; display: flex; align-items: center; justify-content: space-between; border: none; background: transparent; padding: 22px 32px; cursor: pointer; font-family: 'Noto Sans SC', sans-serif;\">\n              <span style=\"display: flex; align-items: center; gap: 20px;\">\n                <span style=\"font-family: 'Space Grotesk', sans-serif; font-size: 13px; color: #2547D0;\">{{ d.num }}<\u002Fspan>\n                <span style=\"font-family: 'Noto Serif SC', serif; font-size: 21px; font-weight: 700; color: #1B1A17;\">{{ d.dim }}<\u002Fspan>\n              <\u002Fspan>\n              <span style=\"font-family: 'Space Grotesk', sans-serif; font-size: 22px; color: #2547D0;\">{{ d.icon }}<\u002Fspan>\n            <\u002Fbutton>\n            <sc-if value=\"{{ d.open }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding: 0 32px 28px;\">\n                <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 18px;\">\n                  <div style=\"padding: 22px 24px; background: #FFFFFF; border: 1px solid #E3DFD6;\">\n                    <div style=\"font-size: 13px; letter-spacing: 0.08em; color: #A8A49A; margin-bottom: 10px;\">传统产品经理<\u002Fdiv>\n                    <div style=\"font-size: 15.5px; line-height: 1.8; color: #1B1A17;\">{{ d.trad }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"padding: 22px 24px; background: #EFF2FD; border: 1px solid #2547D0;\">\n                    <div style=\"font-size: 13px; letter-spacing: 0.08em; color: #2547D0; margin-bottom: 10px;\">AI 产品经理<\u002Fdiv>\n                    <div style=\"font-size: 15.5px; line-height: 1.8; color: #1B1A17;\">{{ d.ai }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display: flex; gap: 12px; align-items: baseline; padding: 16px 24px; background: #1B1A17; color: #F0EBDF; font-size: 14.5px; line-height: 1.7;\">\n                  <span style=\"font-family: 'Space Grotesk', sans-serif; font-size: 12px; letter-spacing: 0.14em; color: #7B8FE0; white-space: nowrap;\">NOTE<\u002Fspan>{{ d.note }}\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ══════════ 联系我们 ══════════ -->\n  <section id=\"contact\" data-screen-label=\"联系我们\" style=\"padding: 110px 64px 120px; background: #1B1A17; color: #F0EBDF;\">\n    <div style=\"max-width: 1240px; margin: 0 auto; display: grid; grid-template-columns: 1.2fr 1fr; gap: 80px; align-items: start;\">\n      <div>\n        <span style=\"font-family: 'Space Grotesk', sans-serif; font-size: 13px; letter-spacing: 0.16em; color: #7B8FE0;\">07 — CONTACT<\u002Fspan>\n        <h2 style=\"font-family: 'Noto Serif SC', serif; font-weight: 900; font-size: 52px; margin: 20px 0 28px; line-height: 1.25;\">加入 Kevin论坛，<br>与行业一起进化。<\u002Fh2>\n        <p style=\"font-size: 17px; line-height: 1.9; color: #A8A49A; max-width: 460px; text-wrap: pretty;\">无论你是正在招聘 AI 产品经理的企业，还是希望进入这个领域的从业者，都欢迎与我们联系。<\u002Fp>\n        <div style=\"display: flex; flex-direction: column; gap: 14px; margin-top: 44px; font-size: 16px;\">\n          <div style=\"display: flex; gap: 16px;\"><span style=\"color: #7B8FE0; font-family: 'Space Grotesk', sans-serif; width: 64px;\">EMAIL<\u002Fspan><a href=\"mailto:hello@kevinforum.cn\" style=\"color: #F0EBDF;\">hello@kevinforum.cn<\u002Fa><\u002Fdiv>\n          <div style=\"display: flex; gap: 16px;\"><span style=\"color: #7B8FE0; font-family: 'Space Grotesk', sans-serif; width: 64px;\">WECHAT<\u002Fspan><span>KevinForum_AI<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background: #F0EBDF; color: #1B1A17; padding: 44px 40px;\">\n        <div style=\"font-family: 'Noto Serif SC', serif; font-size: 24px; font-weight: 700; margin-bottom: 28px;\">留下你的信息<\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 18px;\">\n          <label style=\"display: flex; flex-direction: column; gap: 8px; font-size: 13px; color: #4A4740;\">姓名<input value=\"{{ formName }}\" onchange=\"{{ onFormName }}\" placeholder=\"你的姓名\" style=\"height: 46px; border: 1px solid #C9C4B8; background: #FFFFFF; padding: 0 14px; font-size: 15px; font-family: 'Noto Sans SC', sans-serif; outline: none;\"><\u002Flabel>\n          <label style=\"display: flex; flex-direction: column; gap: 8px; font-size: 13px; color: #4A4740;\">邮箱<input value=\"{{ formEmail }}\" onchange=\"{{ onFormEmail }}\" placeholder=\"you@company.com\" style=\"height: 46px; border: 1px solid #C9C4B8; background: #FFFFFF; padding: 0 14px; font-size: 15px; font-family: 'Noto Sans SC', sans-serif; outline: none;\"><\u002Flabel>\n          <button onclick=\"{{ submitForm }}\" style=\"height: 54px; background: #2547D0; color: #F0EBDF; border: none; font-size: 16px; font-weight: 500; font-family: 'Noto Sans SC', sans-serif; cursor: pointer; margin-top: 6px;\" style-hover=\"background: #16309B;\">{{ submitLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width: 1240px; margin: 88px auto 0; padding-top: 28px; border-top: 1px solid #3A3831; display: flex; justify-content: space-between; font-size: 13px; color: #A8A49A;\">\n      <span>© 2026 Kevin论坛 · AI 产品经理社区<\u002Fspan>\n      <span style=\"font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.12em;\">KEVIN FORUM — AI PM COMMUNITY<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    formName: '', formEmail: '', role: 'seeker', submitted: false,\n    aiCompany: '', aiTab: 'demand', aiLoading: false, aiError: '',\n    aiResults: {}, // { [company]: { demand, users, prd } }\n    learnStage: 0, openDim: 0,\n    apiKey: (typeof localStorage !== 'undefined' && localStorage.getItem('kevin_forum_api_key')) || '',\n  };\n\n  componentDidMount() {\n    // 运行时加载字体（避免打包器处理外部字体 CSS）\n    if (!document.getElementById('kevin-fonts')) {\n      const l = document.createElement('link');\n      l.id = 'kevin-fonts';\n      l.rel = 'stylesheet';\n      l.href = 'https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700;900&family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap';\n      document.head.appendChild(l);\n    }\n  }\n\n  hasPlatformAI() {\n    return typeof window.claude?.complete === 'function';\n  }\n\n  async callAI(system, userMsg) {\n    if (this.hasPlatformAI()) {\n      return await window.claude.complete({\n        model: 'claude-sonnet-4-5',\n        max_tokens: 8000,\n        system,\n        messages: [{ role: 'user', content: userMsg }],\n      });\n    }\n    const key = this.state.apiKey.trim();\n    if (!key) { const e = new Error('NEED_KEY'); e.needKey = true; throw e; }\n    const r = await fetch('https://api.anthropic.com/v1/messages', {\n      method: 'POST',\n      headers: {\n        'content-type': 'application/json',\n        'x-api-key': key,\n        'anthropic-version': '2023-06-01',\n        'anthropic-dangerous-direct-browser-access': 'true',\n      },\n      body: JSON.stringify({ model: 'claude-sonnet-4-5', max_tokens: 8000, system, messages: [{ role: 'user', content: userMsg }] }),\n    });\n    if (!r.ok) throw new Error('API 请求失败（' + r.status + '），请检查 Key 是否有效、账户是否有余额。');\n    const j = await r.json();\n    return (j.content || []).map(b => b.text || '').join('');\n  }\n\n  learnPath = [\n    { stage: '01', title: '基础认知', goal: '理解大模型能力边界，建立 AI 产品世界观', resources: [\n      { type: '视频', title: 'AI for Everyone（吴恩达）', url: 'https://www.coursera.org/learn/ai-for-everyone', desc: '非技术视角理解 AI 能做什么、不能做什么。' },\n      { type: '视频', title: 'B站 · 大模型入门合集', url: 'https://search.bilibili.com/all?keyword=%E5%A4%A7%E6%A8%A1%E5%9E%8B%E5%85%A5%E9%97%A8', desc: '中文视频合集，快速建立对 LLM 的直觉。' },\n      { type: '文档', title: 'Anthropic 官方文档', url: 'https://docs.anthropic.com', desc: '了解模型能力、限制与 API 基本概念。' },\n    ]},\n    { stage: '02', title: '核心技能', goal: '掌握 Prompt 设计、评估（Evals）与 AI 交互设计', resources: [\n      { type: '视频', title: 'DeepLearning.AI 短课程', url: 'https://www.deeplearning.ai/short-courses/', desc: 'Prompt Engineering、Evals 等实操短课。' },\n      { type: '文档', title: 'Anthropic Prompt 工程指南', url: 'https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/overview', desc: '系统学习提示词设计方法论。' },\n      { type: '文档', title: 'Google PAIR 人机交互指南', url: 'https://pair.withgoogle.com/guidebook/', desc: 'AI 产品的用户体验设计原则。' },\n    ]},\n    { stage: '03', title: '实战进阶', goal: '完成 Agent 产品拆解与一份完整的 AI PRD', resources: [\n      { type: '视频', title: 'B站 · AI Agent 产品拆解', url: 'https://search.bilibili.com/all?keyword=AI%20Agent%20%E4%BA%A7%E5%93%81', desc: '案例视频：主流 Agent 产品的设计思路。' },\n      { type: '文档', title: '人人都是产品经理 · AI 专栏', url: 'https://www.woshipm.com/tag/aigc', desc: '中文社区的 AI PM 实战文章。' },\n      { type: '文档', title: 'Kevin论坛 · AI 分析工具', url: '#ai', desc: '用上方的 AI 分析工具，产出你的第一份 AI PRD。' },\n    ]},\n  ];\n\n  pmDimsData = [\n    { dim: '需求定义', trad: '需求明确、边界清晰，PRD 定义的是确定性功能：输入 A，必然得到 B。', ai: '需求围绕模型能力展开，输出是概率性的，必须先定义\"足够好\"的标准与失败容忍度。', note: '先做可行性验证（模型到底能不能做到），再动笔写 PRD——顺序反了会浪费整个迭代。' },\n    { dim: '评估方式', trad: '功能通过测试用例验收，对与错分明，上线即稳定。', ai: '需要建立 Eval 评估集，用打分、抽检和 A/B 持续衡量输出质量。', note: '没有评估体系的 AI 产品无法迭代。Eval 要先于功能开发搭建，而不是上线后补。' },\n    { dim: '技能要求', trad: '用户研究、原型设计、数据分析、项目管理。', ai: '在此基础上增加：Prompt 设计、模型选型、成本测算、数据与评估思维。', note: '不必会写代码，但必须能与算法团队用同一套语言沟通——token、上下文、微调、RAG。' },\n    { dim: '交互设计', trad: '确定性流程：点击、表单、页面跳转，用户预期稳定。', ai: '对话式与生成式交互，需要专门设计等待态、失败态与用户纠错路径。', note: '永远为\"模型答错了\"设计兜底体验：重试、人工接管、明确的不确定性提示。' },\n    { dim: '风险合规', trad: '主要关注隐私、数据安全与常规合规要求。', ai: '额外关注幻觉、偏见、内容安全、版权与可解释性。', note: '上线前做红队测试；明确免责声明与人工兜底机制，高风险场景保留人工审核。' },\n  ];\n\n  splitChunks(text, size) {\n    const paras = String(text).split(/\\n+/);\n    const chunks = []; let cur = '';\n    for (const p of paras) {\n      if (cur && (cur.length + p.length) > size) { chunks.push(cur); cur = p; }\n      else cur = cur ? cur + '\\n' + p : p;\n    }\n    if (cur) chunks.push(cur);\n    return chunks.length ? chunks : [''];\n  }\n\n  getExportData() {\n    const company = this.state.aiCompany.trim();\n    const res = this.state.aiResults[company];\n    if (!company || !res || !Object.keys(res).length) {\n      this.setState({ aiError: '请先完成至少一项分析，再导出文档。' });\n      return null;\n    }\n    return { company, res };\n  }\n\n  exportPPT() {\n    const data = this.getExportData();\n    if (!data) return;\n    if (!window.PptxGenJS) { this.setState({ aiError: 'PPT 组件尚未加载完成，请稍后重试。' }); return; }\n    const pptx = new window.PptxGenJS();\n    const title = pptx.addSlide();\n    title.background = { color: 'F2EDE3' };\n    title.addText(data.company, { x: 0.6, y: 1.6, w: 8.8, h: 1, fontSize: 36, bold: true, color: '1B1A17', fontFace: 'Microsoft YaHei' });\n    title.addText('AI 产品分析报告 · Kevin论坛 · ' + new Date().toLocaleDateString('zh-CN'), { x: 0.6, y: 2.7, w: 8.8, h: 0.5, fontSize: 14, color: '4A4740', fontFace: 'Microsoft YaHei' });\n    Object.keys(data.res).forEach(k => {\n      const chunks = this.splitChunks(data.res[k], 900);\n      chunks.forEach((c, i) => {\n        const s = pptx.addSlide();\n        s.background = { color: 'FFFFFF' };\n        s.addText(this.aiPrompts[k].label + (chunks.length > 1 ? '（' + (i + 1) + '/' + chunks.length + '）' : ''), { x: 0.5, y: 0.3, w: 9, h: 0.6, fontSize: 22, bold: true, color: '2547D0', fontFace: 'Microsoft YaHei' });\n        s.addText(c, { x: 0.5, y: 1.05, w: 9, h: 4.3, fontSize: 12, color: '1B1A17', valign: 'top', fontFace: 'Microsoft YaHei' });\n      });\n    });\n    pptx.writeFile({ fileName: data.company + '-AI产品分析.pptx' });\n  }\n\n  exportExcel() {\n    const data = this.getExportData();\n    if (!data) return;\n    const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/<\u002Fg, '&lt;').replace(/\\n/g, '<br>');\n    let rows = '';\n    Object.keys(data.res).forEach(k => {\n      rows += '<tr><td style=\"vertical-align:top;font-weight:bold;width:120px\">' + esc(this.aiPrompts[k].label) + '<\u002Ftd><td>' + esc(data.res[k]) + '<\u002Ftd><\u002Ftr>';\n    });\n    const html = '\\ufeff<html><head><meta charset=\"utf-8\"><\u002Fhead><body><table border=\"1\"><tr><th>模块<\u002Fth><th>内容（' + esc(data.company) + ' · ' + new Date().toLocaleDateString('zh-CN') + '）<\u002Fth><\u002Ftr>' + rows + '<\u002Ftable><\u002Fbody><\u002Fhtml>';\n    const blob = new Blob([html], { type: 'application/vnd.ms-excel;charset=utf-8' });\n    const a = document.createElement('a');\n    a.href = URL.createObjectURL(blob);\n    a.download = data.company + '-AI产品分析.xls';\n    a.click();\n    URL.revokeObjectURL(a.href);\n  }\n\n  aiPrompts = {\n    demand: { label: '需求分析', prompt: '请严格按以下模版，对这家企业输出一份详尽的需求分析报告。每一节都必须结合该公司的具体业务展开分析，给出具体的例子、场景和判断依据，禁止泛泛而谈：\\n\\n一、公司与业务背景：主营业务、商业模式、目标市场、市场地位与竞争格局\\n二、产品现状盘点：产品矩阵、各产品核心功能与定位、当前短板\\n三、用户需求挖掘：3-5 个细分使用场景，每个场景的核心痛点与现有解决方式；用 KANO 模型区分基本型/期望型/兴奋型需求\\n四、未来规划推演：结合行业趋势，推演其 1-3 年战略方向，指出 3 个以上 AI 落地机会点并说明理由\\n五、竞品对标：选 2-3 个直接竞品，逐条对比差异与可借鉴之处\\n六、需求优先级建议：P0/P1/P2 分级列表，每项附优先级理由与预期收益' },\n    users: { label: '用户分析', prompt: '请严格按以下模版，对这家企业的产品输出一份详尽的用户分析报告。必须结合该公司的实际产品与市场具体展开，给出可信的推断依据：\\n\\n一、市场与用户规模：目标市场容量、用户总盘与增长趋势的合理估计\\n二、用户细分：按角色/场景/付费能力划分 3-4 个细分群体，说明各自占比与价值\\n三、典型用户画像：3 个完整画像，每个包含姓名与角色设定、所在场景、核心目标、关键痛点、使用频率、决策链与付费意愿\\n四、用户旅程地图：从认知→试用→付费→留存→推荐，逐阶段列出触点、用户心理、流失风险与改进点\\n五、增长与留存策略：针对每个细分群体给出具体的获客渠道与留存抓手' },\n    prd: { label: 'PRD 输出', prompt: '请严格按以下模版，基于这家企业的产品方向与未来规划，输出一份完整、可直接使用的 PRD。每个功能必须写到可开发评审的详细程度：\\n\\n一、文档信息：版本、日期、适用范围\\n二、产品概述：业务背景、产品目标、北极星指标与护栏指标\\n三、目标用户与核心场景：用户群体定义 + 3 个核心使用场景描述\\n四、功能需求清单：按 P0/P1/P2 分级，每个功能包含功能描述、用户故事（作为…我希望…以便…）、验收标准\\n五、核心流程：主流程分步描述 + 至少 2 个异常流程的处理方式\\n六、AI 能力设计：模型选型建议、Prompt 策略、评估方案（Eval 集如何搭建）、错误兜底机制\\n七、非功能需求：性能、安全、合规要求\\n八、风险与依赖：技术/数据/合规风险及缓解措施\\n九、里程碑建议：分阶段交付计划' },\n  };\n\n  async runAnalysis(tab) {\n    const company = this.state.aiCompany.trim();\n    if (!company) { this.setState({ aiError: '请先输入企业名称。' }); return; }\n    const key = tab ?? this.state.aiTab;\n    const cached = this.state.aiResults[company]?.[key];\n    if (cached || this.state.aiLoading) return;\n    this.setState({ aiLoading: true, aiError: '' });\n    try {\n      const text = await this.callAI(\n        '你是一位资深 AI 产品经理导师，正在为付费客户撰写专业分析报告。用简体中文回答，输出纯文本（不要 Markdown 符号如 # 或 *），用编号标题和段落组织内容。内容必须详尽、具体、有深度，结合该企业的真实业务展开；如果对该企业不了解，基于名称合理推断其行业并明确说明这是推断。',\n        `企业名称：${company}\\n\\n${this.aiPrompts[key].prompt}`\n      );\n      this.setState(s => ({\n        aiLoading: false,\n        aiResults: { ...s.aiResults, [company]: { ...(s.aiResults[company] || {}), [key]: text } },\n      }));\n    } catch (e) {\n      const msg = e?.needKey ? '请先在上方输入 Anthropic API Key，再开始分析。' : ('分析失败，请稍后重试。' + (e?.message ? '（' + e.message + '）' : ''));\n      this.setState({ aiLoading: false, aiError: msg });\n    }\n  }\n\n  renderVals() {\n    const accent = this.props.accentColor ?? '#2547D0';\n    return {\n      stats: [\n        { value: '12,000', unit: '+', label: '注册社区成员' },\n        { value: '340', unit: '+', label: '整理的行业规范与技术专题' },\n        { value: '180', unit: '+', label: '合作招聘企业' },\n        { value: '92', unit: '%', label: '求职者反馈内容有帮助' },\n      ],\n      services: [\n        { num: '01', title: '行业规范整理', desc: '持续跟踪 AI 产品领域的规范、标准与最佳实践，整理成结构化、可检索的知识库。', points: ['AI 产品评估规范', '合规与安全指引', 'PRD 与文档范式'] },\n        { num: '02', title: '前沿技术洞察', desc: '把最新的模型能力、Agent 架构与工具链变化，翻译成产品经理能直接使用的判断依据。', points: ['每周技术简报', '深度专题解读', '实践案例拆解'] },\n        { num: '03', title: '招聘与求职对接', desc: '连接正在招聘 AI 产品经理的企业与求职者，让匹配基于真实能力而非关键词。', points: ['企业岗位直发', '能力画像与作品集', '一对一内推通道'] },\n      ],\n      partners: ['PARTNER 01', 'PARTNER 02', 'PARTNER 03', 'PARTNER 04', 'PARTNER 05', 'PARTNER 06'],\n      quotes: [\n        { text: '“我们在这里招到的 AI 产品经理，对评估体系的理解明显超出一般候选人。”', who: '某 AI 公司 · 产品负责人' },\n        { text: '“论坛整理的行业规范帮我在三个月内完成了从传统 PM 到 AI PM 的转型。”', who: '社区成员 · AI 产品经理' },\n      ],\n      team: [\n        { name: 'Kevin', role: '创始人 · 主理人', bio: '十年产品经验，专注 AI 产品方法论与行业规范研究。' },\n        { name: '待补充', role: '内容负责人', bio: '负责技术专题与每周简报的整理与出品。' },\n        { name: '待补充', role: '社区运营', bio: '负责社区活动、企业合作与成员成长体系。' },\n        { name: '待补充', role: '招聘对接', bio: '负责企业岗位审核与求职者匹配服务。' },\n      ],\n      formName: this.state.formName,\n      formEmail: this.state.formEmail,\n      onFormName: (e) => this.setState({ formName: e.target.value }),\n      onFormEmail: (e) => this.setState({ formEmail: e.target.value }),\n      submitForm: () => this.setState({ submitted: true }),\n      submitLabel: this.state.submitted ? '已提交，我们会尽快联系你 ✓' : '提交',\n\n      // ── AI 企业分析 ──\n      aiCompany: this.state.aiCompany,\n      onAiCompany: (e) => this.setState({ aiCompany: e.target.value, aiError: '' }),\n      onAiKeyDown: (e) => { if (e.key === 'Enter') this.runAnalysis(); },\n      runAnalysis: () => this.runAnalysis(),\n      aiLoading: this.state.aiLoading,\n      analyzeLabel: this.state.aiLoading ? '分析中…' : '开始分析',\n      aiLoadingText: '正在按专业模版生成「' + this.aiPrompts[this.state.aiTab].label + '」，篇幅较长，约需 30–60 秒…',\n      aiTabs: Object.keys(this.aiPrompts).map(key => {\n        const active = this.state.aiTab === key;\n        return {\n          label: this.aiPrompts[key].label,\n          bg: active ? '#1B1A17' : '#FFFFFF',\n          color: active ? '#F0EBDF' : '#4A4740',\n          pick: () => { this.setState({ aiTab: key }); this.runAnalysis(key); },\n        };\n      }),\n      aiResult: this.state.aiResults[this.state.aiCompany.trim()]?.[this.state.aiTab] || false,\n      aiError: this.state.aiError || false,\n      aiShowEmpty: !this.state.aiLoading && !this.state.aiError && !(this.state.aiResults[this.state.aiCompany.trim()]?.[this.state.aiTab]),\n      exportPPT: () => this.exportPPT(),\n      exportExcel: () => this.exportExcel(),\n      showKeyRow: !this.hasPlatformAI(),\n      apiKey: this.state.apiKey,\n      onApiKey: (e) => {\n        const v = e.target.value;\n        this.setState({ apiKey: v, aiError: '' });\n        try { localStorage.setItem('kevin_forum_api_key', v); } catch (err) {}\n      },\n\n      // ── 学习路径 ──\n      learnStages: this.learnPath.map((st, i) => {\n        const active = this.state.learnStage === i;\n        return {\n          stage: st.stage, title: st.title, goal: st.goal,\n          bg: active ? '#1B1A17' : '#FFFFFF',\n          color: active ? '#F0EBDF' : '#1B1A17',\n          numColor: active ? '#7B8FE0' : '#2547D0',\n          goalColor: active ? '#A8A49A' : '#4A4740',\n          pick: () => this.setState({ learnStage: i }),\n        };\n      }),\n      learnResources: this.learnPath[this.state.learnStage].resources.map(r => ({\n        ...r,\n        tagBg: r.type === '视频' ? '#2547D0' : '#1B1A17',\n        tagColor: '#F0EBDF',\n      })),\n\n      // ── PM 对比 ──\n      pmDims: this.pmDimsData.map((d, i) => {\n        const open = this.state.openDim === i;\n        return {\n          ...d,\n          num: '0' + (i + 1),\n          open,\n          icon: open ? '−' : '+',\n          bg: open ? '#F0EBDF' : '#FFFFFF',\n          toggle: () => this.setState({ openDim: open ? -1 : i }),\n        };\n      }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
